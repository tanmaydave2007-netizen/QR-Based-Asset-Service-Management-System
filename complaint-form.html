<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akshaya Patra Complaint Portal</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <main class="portal">
        <header class="header">
            <div class="brand">
                <img src="logo.png" alt="Akshaya Patra Logo" class="logo" />

                <div>
                    <h1>Akshaya Patra Complaint Portal</h1>
                    <p>Submit, track and manage complaints professionally.</p>
                </div>
            </div>

            <div class="header-divider"></div>

            <div class="welcome-text">
                <i data-lucide="circle-user-round"></i>
                <span>Welcome to Akshaya Patra</span>
            </div>

            <div class="header-divider"></div>

            <span class="badge">
                <i data-lucide="headphones"></i>
                Employee Support
            </span>
        </header>

        <section class="card">
            <h2 class="section-title">
                <i data-lucide="square-pen"></i>
                Raise New Complaint
            </h2>

            <form id="complaintForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="userName">User Name <span>*</span></label>
                        <div class="field-control">
                            <i data-lucide="user"></i>
                            <input type="text" id="userName" name="userName" placeholder="Enter user name" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number <span>*</span></label>
                        <div class="field-control">
                            <i data-lucide="phone"></i>
                            <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required />
                        </div>
                    </div>

                    <!-- <div class="form-group">
                        <label for="department">Department <span>*</span></label>
                        <div class="field-control">
                            <i data-lucide="building-2"></i>
                            <input type="text" id="department" name="department" placeholder="Enter department"
                                required />
                        </div>
                    </div> -->

                    <div class="form-group">
                        <label for="category">Department<span>*</span></label>
                        <div class="field-control select-control">
                            <i data-lucide="panel-top"></i>
                            <select id="category" name="category" required>
                                <option value="">Select category</option>
                                <option>Electrical</option>
                                <option>IT</option>
                                <option>Kitchen/Production</option>
                                <option>Maintenance</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group full">
                        <label for="email">Email ID <span>*</span></label>
                        <div class="field-control">
                            <i data-lucide="mail"></i>
                            <input type="email" id="email" name="email" placeholder="Enter email address" required />
                        </div>
                    </div>

                    <div class="form-group full">
                        <label for="title">Complaint Title <span>*</span></label>
                        <div class="field-control">
                            <i data-lucide="message-square-text"></i>
                            <input type="text" id="title" name="title" placeholder="Short complaint title" required />
                        </div>
                    </div>

                    <div class="form-group full">
                        <label for="description">Complaint Description <small>(Optional)</small></label>
                        <div class="field-control textarea-control">
                            <i data-lucide="clipboard-list"></i>
                            <textarea id="description" name="description" rows="4"
                                placeholder="Write complaint details (optional)"></textarea>
                        </div>
                    </div>

                    <div class="form-group upload-group">
                        <label for="photo">Upload Photo <small>(Optional)</small></label>
                        <div class="field-control file-control">
                            <i data-lucide="image"></i>
                            <input type="file" id="photo" name="photo" accept="image/*" />
                        </div>
                    </div>

                    <div class="form-group full">
                        <label>Priority <span>*</span></label>

                        <div class="priority-box">
                            <input type="radio" id="low" name="priority" value="Low" required />
                            <label for="low"><span class="ring green"></span>Low</label>

                            <input type="radio" id="medium" name="priority" value="Medium" />
                            <label for="medium"><span class="ring yellow"></span>Medium</label>

                            <input type="radio" id="high" name="priority" value="High" />
                            <label for="high"><span class="ring red"></span>High</label>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button type="submit" class="submit-btn">
                        <i data-lucide="send"></i>
                        Submit Complaint
                    </button>

                    <button type="reset" class="reset-btn">
                        <i data-lucide="rotate-ccw"></i>
                        Clear
                    </button>
                </div>

                <div class="success" id="successBox"></div>
            </form>
        </section>

        <aside>
            <div class="card side-card">
                <h2 class="section-title">
                    <i data-lucide="bar-chart-3"></i>
                    Complaint Summary
                </h2>

                <div class="stat">
                    <span>Total Complaints</span>
                    <strong id="totalCount">0</strong>
                </div>

                <div class="stat">
                    <span>Pending</span>
                    <strong id="pendingCount">0</strong>
                </div>

                <div class="stat">
                    <span>High Priority</span>
                    <strong id="highCount">0</strong>
                </div>
            </div>

            <div class="card side-card">
                <h2 class="section-title">
                    <i data-lucide="image"></i>
                    Photo Preview
                </h2>

                <div class="preview">
                    <img id="photoPreview" alt="Complaint photo preview" />
                    <i data-lucide="image" class="empty-icon"></i>
                    <span id="previewText">No photo selected</span>
                </div>
            </div>

            <div class="card">
                <h2 class="section-title">
                    <i data-lucide="clock"></i>
                    Recent Complaints
                </h2>

                <div class="complaint-list" id="complaintList">
                    <div class="empty-state">
                        <i data-lucide="file"></i>
                        <p>No recent complaints found.</p>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        lucide.createIcons();

        const form = document.getElementById("complaintForm");
        const successBox = document.getElementById("successBox");
        const complaintList = document.getElementById("complaintList");
        const totalCount = document.getElementById("totalCount");
        const pendingCount = document.getElementById("pendingCount");
        const highCount = document.getElementById("highCount");
        const photoInput = document.getElementById("photo");
        const photoPreview = document.getElementById("photoPreview");
        const previewText = document.getElementById("previewText");

        let complaints = [];

        photoInput.addEventListener("change", function () {
            const file = this.files[0];

            if (!file) {
                photoPreview.style.display = "none";
                previewText.style.display = "block";
                return;
            }

            const reader = new FileReader();

            reader.onload = function (event) {
                photoPreview.src = event.target.result;
                photoPreview.style.display = "block";
                previewText.style.display = "none";
            };

            reader.readAsDataURL(file);
        });

        form.addEventListener("submit", function (event) {
            event.preventDefault();

            window.location.href = "success.html";
        });

        function updateDashboard() {
            totalCount.textContent = complaints.length;
            pendingCount.textContent = complaints.filter(item => item.status === "Pending").length;
            highCount.textContent = complaints.filter(item => item.priority === "High").length;

            complaintList.innerHTML = "";

            complaints.slice(0, 5).forEach(function (item) {
                const div = document.createElement("div");
                div.className = "complaint-item";

                div.innerHTML = `
          <h4>${item.title}</h4>
          <p><b>Ticket:</b> ${item.ticket}</p>
          <p><b>Category:</b> ${item.category}</p>
          <span class="tag">${item.priority} Priority</span>
        `;

                complaintList.appendChild(div);
            });
        }

    </script>
</body>

</html>
